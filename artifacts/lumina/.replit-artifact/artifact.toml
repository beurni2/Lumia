kind = "mobile"
previewPath = "/"
title = "Lumina"
version = "1.0.0"
id = "artifacts/lumina"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24633

[services.development]
run = "pnpm --filter @workspace/lumina run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumina", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lumina", "run", "serve" ]

[services.env]
PORT = "24633"
BASE_PATH = "/"
