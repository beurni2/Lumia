openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: creator
    description: Creator profile
  - name: trends
    description: Trending content briefs
  - name: earnings
    description: Creator earnings and brand deals
  - name: videos
    description: Swarm-produced videos in the studio pipeline
  - name: agents
    description: Autonomous swarm — Ideator, Director, Editor, Monetizer
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /creator/me:
    get:
      operationId: getCurrentCreator
      tags: [creator]
      summary: Get the signed-in creator's profile
      responses:
        "200":
          description: Creator profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creator"
  /trends:
    get:
      operationId: listTrendBriefs
      tags: [trends]
      summary: List today's trend briefs
      responses:
        "200":
          description: Trend briefs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendBriefList"
  /earnings/summary:
    get:
      operationId: getEarningsSummary
      tags: [earnings]
      summary: Current month earnings summary
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"
  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List videos in the swarm pipeline
      responses:
        "200":
          description: Videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoList"
  /agents/run-overnight:
    post:
      operationId: startSwarmRun
      tags: [agents]
      summary: Kick off a swarm cycle for the signed-in creator
      description: |
        Starts the four-agent pipeline (Ideator → Director → Editor → Monetizer)
        for the resolved creator. Returns immediately with a `runId` the client
        can poll. The pipeline writes new trend briefs, a video, a brand deal,
        and a ledger entry; the existing /trends, /videos, /earnings/summary
        endpoints reflect those changes on next refetch.
      responses:
        "202":
          description: Swarm run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwarmRunStart"
  /agents/runs:
    get:
      operationId: listSwarmRuns
      tags: [agents]
      summary: Recent swarm runs for the signed-in creator
      responses:
        "200":
          description: Swarm runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwarmRunList"
  /agents/runs/{id}:
    get:
      operationId: getSwarmRun
      tags: [agents]
      summary: Detailed view of one swarm run with per-agent status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Swarm run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwarmRunDetail"
        "404":
          description: Run not found
  /videos/{id}/publications:
    post:
      operationId: recordPublication
      tags: [publications]
      summary: Record one platform publish outcome for a video
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublicationInput"
      responses:
        "201":
          description: Publication recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publication"
        "400":
          description: Invalid input
        "401":
          description: Unknown user
        "404":
          description: Video not found
    get:
      operationId: listVideoPublications
      tags: [publications]
      summary: List publications for a video
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Publications for the video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationList"
        "401":
          description: Unknown user
  /videos/{id}/publications/{pubId}/metrics:
    patch:
      operationId: updatePublicationMetrics
      tags: [publications]
      summary: Store fresh platform metrics for a publication
      description: |
        Mobile-driven analytics refresh. The mobile app holds the OAuth
        tokens for TikTok / Instagram / YouTube; it fetches the post's
        latest views/likes/comments/shares and PATCHes them here.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: pubId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationMetrics"
      responses:
        "200":
          description: Metrics persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publication"
        "400":
          description: Invalid input
        "401":
          description: Unknown user
        "404":
          description: Publication not found
  /me/consent:
    get:
      operationId: getConsent
      tags: [me]
      summary: Current AI-disclosure + adult-confirmation consent state
      responses:
        "200":
          description: Consent state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentState"
        "401":
          description: Unknown user
    post:
      operationId: upsertConsent
      tags: [me]
      summary: Grant or withdraw AI-disclosure / adult consent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentInput"
      responses:
        "200":
          description: Updated consent state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentState"
        "400":
          description: Invalid input
        "401":
          description: Unknown user
  /me/schedule:
    get:
      operationId: getSchedule
      tags: [me]
      summary: Nightly swarm schedule preferences
      responses:
        "200":
          description: Schedule state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleState"
        "401":
          description: Unknown user
    post:
      operationId: upsertSchedule
      tags: [me]
      summary: Set nightly swarm schedule preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleInput"
        "400":
          description: Invalid input
        "401":
          description: Unknown user
        "403":
          description: Consent required to enable
  /me/data-export:
    post:
      operationId: exportMyData
      tags: [me]
      summary: GDPR/CCPA — every row owned by this creator as JSON
      responses:
        "200":
          description: Data export
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unknown user
  /me/data-delete:
    post:
      operationId: deleteMyData
      tags: [me]
      summary: GDPR/CCPA — hard-delete this creator and all owned rows
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                required: [deleted]
        "401":
          description: Unknown user
  /publications/recent:
    get:
      operationId: listRecentPublications
      tags: [publications]
      summary: Recent publications across all videos for the signed-in creator
      responses:
        "200":
          description: Recent publications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationList"
        "401":
          description: Unknown user
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Creator:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        niche:
          type: string
        followers:
          type: integer
        currency:
          type: string
        imageKey:
          type: string
          description: Stable key for the bundled creator avatar (e.g. "creator-1")
      required: [id, name, location, niche, followers, currency, imageKey]
    TrendBrief:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        context:
          type: string
        viralPotential:
          type: integer
          minimum: 0
          maximum: 100
        description:
          type: string
        imageKey:
          type: string
      required: [id, title, context, viralPotential, description, imageKey]
    TrendBriefList:
      type: object
      properties:
        briefs:
          type: array
          items:
            $ref: "#/components/schemas/TrendBrief"
      required: [briefs]
    BrandDeal:
      type: object
      properties:
        id:
          type: string
        brand:
          type: string
        status:
          type: string
          enum: [Signed, Negotiating, Paid]
        amount:
          type: number
      required: [id, brand, status, amount]
    AgentStatus:
      type: string
      enum: [pending, active, done]
    VideoStatus:
      type: string
      enum: [Ideating, Editing, Ready]
    Video:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/VideoStatus"
        viralScore:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
        reasoning:
          type: string
        thumbnailKey:
          type: string
        script:
          type: string
        agents:
          type: object
          properties:
            Ideator:
              $ref: "#/components/schemas/AgentStatus"
            Director:
              $ref: "#/components/schemas/AgentStatus"
            Editor:
              $ref: "#/components/schemas/AgentStatus"
            Monetizer:
              $ref: "#/components/schemas/AgentStatus"
          required: [Ideator, Director, Editor, Monetizer]
      required: [id, title, status, reasoning, thumbnailKey, script, agents]
    VideoList:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
      required: [videos]
    SwarmRunStart:
      type: object
      properties:
        runId:
          type: string
      required: [runId]
    SwarmRunStatus:
      type: string
      enum: [queued, running, done, failed]
    AgentName:
      type: string
      enum: [ideator, director, editor, monetizer]
    SwarmAgentRun:
      type: object
      properties:
        agent:
          $ref: "#/components/schemas/AgentName"
        status:
          $ref: "#/components/schemas/SwarmRunStatus"
        summary:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        startedAt:
          type: string
          nullable: true
        finishedAt:
          type: string
          nullable: true
      required: [agent, status]
    SwarmRunSummary:
      type: object
      properties:
        id:
          type: string
        agent:
          type: string
          description: Always 'swarm' for parent runs
        status:
          $ref: "#/components/schemas/SwarmRunStatus"
        summary:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        startedAt:
          type: string
          nullable: true
        finishedAt:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, agent, status, createdAt]
    SwarmRunList:
      type: object
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/SwarmRunSummary"
      required: [runs]
    PublicationPlatform:
      type: string
      enum: [tiktok, reels, shorts]
    PublicationStatus:
      type: string
      enum: [queued, published, failed, blocked]
    ShieldVerdict:
      type: string
      enum: [pass, rewritten, blocked]
    PublicationMetrics:
      type: object
      properties:
        views:
          type: integer
          minimum: 0
        likes:
          type: integer
          minimum: 0
        comments:
          type: integer
          minimum: 0
        shares:
          type: integer
          minimum: 0
      required: [views, likes, comments, shares]
    ConsentState:
      type: object
      properties:
        aiDisclosureConsentedAt:
          type: string
          format: date-time
          nullable: true
        adultConfirmedAt:
          type: string
          format: date-time
          nullable: true
      required: [aiDisclosureConsentedAt, adultConfirmedAt]
    ConsentInput:
      type: object
      properties:
        aiDisclosureConsented:
          type: boolean
        adultConfirmed:
          type: boolean
      required: [aiDisclosureConsented, adultConfirmed]
    ScheduleState:
      type: object
      properties:
        enabled:
          type: boolean
        hour:
          type: integer
          minimum: 0
          maximum: 23
          nullable: true
        tz:
          type: string
          maxLength: 64
          nullable: true
        lastRunAt:
          type: string
          format: date-time
          nullable: true
      required: [enabled, hour, tz, lastRunAt]
    ScheduleInput:
      type: object
      properties:
        enabled:
          type: boolean
        hour:
          type: integer
          minimum: 0
          maximum: 23
          nullable: true
        tz:
          type: string
          maxLength: 64
          nullable: true
      required: [enabled, hour, tz]
    Publication:
      type: object
      properties:
        id:
          type: string
        videoId:
          type: string
        platform:
          $ref: "#/components/schemas/PublicationPlatform"
        status:
          $ref: "#/components/schemas/PublicationStatus"
        platformPostId:
          type: string
          maxLength: 255
          nullable: true
        mockUrl:
          type: string
          maxLength: 2048
          nullable: true
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          maxLength: 2000
          nullable: true
        shieldVerdict:
          allOf:
            - $ref: "#/components/schemas/ShieldVerdict"
          nullable: true
        metrics:
          allOf:
            - $ref: "#/components/schemas/PublicationMetrics"
          nullable: true
        metricsFetchedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, videoId, platform, status, createdAt]
    PublicationList:
      type: object
      properties:
        publications:
          type: array
          items:
            $ref: "#/components/schemas/Publication"
      required: [publications]
    CreatePublicationInput:
      type: object
      properties:
        platform:
          $ref: "#/components/schemas/PublicationPlatform"
        status:
          $ref: "#/components/schemas/PublicationStatus"
        shieldVerdict:
          $ref: "#/components/schemas/ShieldVerdict"
        platformPostId:
          type: string
          maxLength: 255
          nullable: true
        mockUrl:
          type: string
          maxLength: 2048
          nullable: true
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          maxLength: 2000
          nullable: true
      required: [platform, status, shieldVerdict]
    SwarmRunDetail:
      type: object
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/SwarmRunStatus"
        summary:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        startedAt:
          type: string
          nullable: true
        finishedAt:
          type: string
          nullable: true
        createdAt:
          type: string
        agents:
          type: array
          items:
            $ref: "#/components/schemas/SwarmAgentRun"
      required: [id, status, createdAt, agents]
    EarningsSummary:
      type: object
      properties:
        currentMonth:
          type: number
        currency:
          type: string
        growth:
          type: string
        deals:
          type: array
          items:
            $ref: "#/components/schemas/BrandDeal"
        history:
          type: array
          items:
            type: number
      required: [currentMonth, currency, growth, deals, history]
